<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Menú -->
    <nav>
        <div class="logo-panel">
    <img id="logoPanel" src="" alt="Logo">
    <h2 id="tituloPanel">Sistema Ventas</h2>
</div>
        <ul>
            <li><a href="dashboard.html">🏠 Dashboard</a></li>
            <li><a href="inventario.html">📦 Inventario</a></li>
            <li><a href="ventas.html">💰 Ventas</a></li>
            <li><a href="configuracion.html">⚙️ Configuración</a></li>
        </ul>
        <button onclick="logout()">Cerrar sesión</button>
    </nav>
    <div class="main-content">
    <h1>Configuración</h1>
    <p>Personalización del sistema de ventas</p>

    <div class="card">
    <h3>Datos del negocio</h3>

    <input type="text" id="nombreNegocio" placeholder="Nombre del negocio">

    <input type="text" id="logoNegocio" placeholder="URL del logo">

    <select id="tipoConfig">
        <option value="ropa">Ropa y accesorios</option>
        <option value="abarrotes">Abarrotes / Market</option>
        <option value="restaurante">Restaurante</option>
        <option value="general">General</option>
    </select>

    <select id="moneda">
        <option value="S/">Soles (S/)</option>
        <option value="$">Dólares ($)</option>
    </select>

    <button onclick="guardarConfiguracion()">
        Guardar configuración
    </button>
</div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- App -->
    <script src="js/app.js"></script>
    </div>
</body>
</html>
