<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Menú -->
    <nav>
        <div class="logo-panel">
    <img id="logoPanel" src="" alt="Logo">
    <h2 id="tituloPanel">Sistema Ventas</h2>
</div>
        <ul>
            <li><a href="dashboard.html">🏠 Dashboard</a></li>
            <li><a href="inventario.html">📦 Inventario</a></li>
            <li><a href="ventas.html">💰 Ventas</a></li>
            <li><a href="configuracion.html">⚙️ Configuración</a></li>
        </ul>
        <button onclick="logout()">Cerrar sesión</button>
    </nav>
    <div class="main-content">

    <h1>Ventas</h1>
    <p>Registro y análisis de ventas realizadas</p>

    <!-- Registrar venta -->
    <div class="card">
        <h3>Registrar Venta</h3>

        <input type="text" id="productoVenta" placeholder="Producto">
        <input type="number" id="cantidadVenta" placeholder="Cantidad">

        <button onclick="vender()">Vender</button>
    </div>

    <!-- Total -->
    <div class="card">
        <h3>Total Ganado</h3>
        <h2 id="totalGanado">S/ 0</h2>
    </div>

    <!-- Historial -->
    <div class="card">
        <h3>Historial de Ventas</h3>
        <ul id="historial"></ul>
    </div>

    <!-- Gráfico barras -->
    <div class="card">
        <h3>Ventas por Producto</h3>
        <canvas id="graficoVentas"></canvas>
    </div>

    <!-- Gráfico línea -->
    <div class="card">
        <h3>Ventas por Día</h3>
        <canvas id="graficoDias"></canvas>
    </div>

    <!-- Gráfico pastel -->
    <div class="card">
        <h3>Distribución de Ventas</h3>
        <canvas id="graficoPastel"></canvas>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- App -->
    <script src="js/app.js"></script>
    </div>
</body>
</html>
